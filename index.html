<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="contenedor">
        <h1>Ejercicios Practivos html + css + js</h1>

        <div class="ejercicio">
            <h2>Ejercicio 1: Calcular IMC</h2>
            <p>Calcular el IMC usando variables y operadores. Formula IMC = PESO / (ALTURA) <sup>2</sup> </p>

            <div class="input-group">
                <label for="pesoImc">Peso (kg): *</label>
                <input type="number" name="pesoImc" id="pesoImc" placeholder="00.0" min="5" max="200" step="10" required>
            </div>

            <div class="input-group">
                <label for="alturaImc">Altura (metros): *</label>
                <input type="number" name="alturaImc" id="alturaImc" placeholder="0.0" min="1" max="2.30" step="0.1" required>
            </div>
            
            <button>Calcular IMC</button>

            <div id="resultadoImc" class="resultado">
                <h3>Tu IMC es:</h3>
                <p id="valorImc"></p>
                <p id="categiruaImc"></p>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
